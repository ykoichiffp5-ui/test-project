name: Auto Dashboard

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "0 9 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Linear Data
        run: |
          curl -X POST https://api.linear.app/graphql \
          -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "query": "{ issues(first: 20) { nodes { title state { name } } } }"
          }' \
          > linear-data.json

      - name: Debug JSON
        run: cat linear-data.json

      - name: Generate HTML
        run: |
          export LINEAR_DATA="$(cat linear-data.json)"
          node generate.js

      - name: Debug HTML
        run: cat dist/index.html

      - name: Deploy to Surge
        run: |
          npm install -g surge
          surge ./dist https://diagram-monthly-dashboard.surge.sh/ \
          --token ${{ secrets.SURGE_TOKEN }}
